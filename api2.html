<!DOCTYPE html>
<html>
<head>

    <style>
        body{
    background:#f1ede2;
    font-family:Arial;
    margin:0;
}

header{
    padding:1rem;
    display:flex;
    justify-content:space-between;
    background:#d1c9a475;
}

.search{
    background-color: antiquewhite;
    background:transparent;
    border:2px solid #ffffff;
    padding:0.5rem 1rem;
    border-radius:150px;
    color:white;
}

.search::placeholder{
    color:#8f91a7;
}

main{
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
}

.movie{
    width:500px;
    margin:1rem;
    background:#4ac4e628;
    border-radius:5px;
    overflow:hidden;
    position:relative;
}

.movie img{
    width:100%;
}

.movie-info{
    display:flex;
    justify-content:space-between;
    padding:1rem;
}

.movie-info h3{
    margin:0;
}

.movie-info span{
    padding:0.25rem 0.5rem;
    border-radius:3px;
    font-weight:bold;
}

.green{ color:lightgreen; }
.orange{ color:orange; }
.red{ color:red; }

.overview{
    background:white;
    color:black;
    padding:1rem;
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    transform:translateY(100%);
    transition:0.3s ease;
}

.movie:hover .overview{
    transform:translateY(0);
}


.task-list3 {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 300px;
    margin: 40px auto;
}

.task-list3 a {
    text-decoration: none;
    background: #222;
    color: white;
    padding: 12px;
    text-align: center;
    border-radius: 8px;
    transition: 0.3s;
}
.task-list3 a:hover {
    background: #ff9800;
    transform: scale(1.05);}


    </style>
</head>

<body>

<header>
    
    <form id="form">
        <h2>MOVIES</h2>
        <input type="text" id="search" class="search" placeholder="Search...">
    </form>
</header>

<main id="main"></main>

<script>
const API_KEY = "37153a486788dafbb90b90b4ed4ae4a1";

const BASE_URL = "https://api.themoviedb.org/3";
const IMG_PATH = "https://image.tmdb.org/t/p/w1280";

const DISCOVER_API = `${BASE_URL}/discover/movie?sort_by=popularity.desc&api_key=${API_KEY}`;
const SEARCH_API = `${BASE_URL}/search/movie?api_key=${API_KEY}&query=`;

const main = document.getElementById("main");
const form = document.getElementById("form");
const search = document.getElementById("search");



getMovies(DISCOVER_API);



async function getMovies(url){
    const res = await fetch(url);
    const data = await res.json();

    showMovies(data.results);
}



function showMovies(movies){
    main.innerHTML = "";

    movies.forEach(movie => {

        const { title, poster_path, vote_average, overview } = movie;

        const movieEl = document.createElement("div");
        movieEl.classList.add("movie");

        movieEl.innerHTML = `
            <img src="${IMG_PATH + poster_path}" alt="${title}">

            <div class="movie-info">
                <h3>${title}</h3>
                <span class="${getClass(vote_average)}">${vote_average}</span>
            </div>

            <div class="overview">
                <h3>Overview</h3>
                ${overview}
            </div>
        `;

        main.appendChild(movieEl);
    });
}



function getClass(vote){
    if(vote >= 8){
        return "green";
    } else if(vote >= 5){
        return "orange";
    } else{
        return "red";
    }
}



form.addEventListener("submit", (e)=>{
    e.preventDefault();

    const searchTerm = search.value;

    if(searchTerm && searchTerm !== ""){
        getMovies(SEARCH_API + searchTerm);
        search.value = "";
    } else {
        getMovies(DISCOVER_API);
    }
});


</script>
</body>
</html>
