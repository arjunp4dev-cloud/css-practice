<!DOCTYPE html>
<html>
<head>
<title>Loop Example</title>
<style>
.page{
      text-align: center;
      padding:30px;


}
.task-list3 {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 300px;
    margin: 40px auto;
}

.task-list3 a {
    text-decoration: none;
    background: #222;
    color: white;
    padding: 12px;
    text-align: center;
    border-radius: 8px;
    transition: 0.3s;
}
.task-list3 a:hover {
    background: #ff9800;
    transform: scale(1.05);}
    </style>
</head>


<body>
    <div class="page">

<h2>My Tasks</h2>


<div id="taskContainer"></div>


<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add Task</button>

<div id="taskList"></div>
</div>

<script src="script.js"></script>

</body>
</html>
