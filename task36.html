<!DOCTYPE html>
<html>
<head>
<title>Todo App</title>
</head>
<style>

    body{
font-family: Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
width:300px;
}

input{
padding:10px;
width:70%;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px;
background:#5499be;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#868786;
}

li{
margin-top:10px;
background:#eee;
padding:8px;
border-radius:5px;
display:flex;
justify-content:space-between;
}


.task-list3 {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 300px;
    margin: 40px auto;
}

.task-list3 a {
    text-decoration: none;
    background: #222;
    color: white;
    padding: 12px;
    text-align: center;
    border-radius: 8px;
    transition: 0.3s;
}
.task-list3 a:hover {
    background: #ff9800;
    transform: scale(1.05);}
</style>

<body>

<div class="container">

<h2>My Todo List</h2>

<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
