<!DOCTYPE html>
<html>
<head>
<title>Todo App</title>
<style>

    body{
font-family: Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
width:300px;
}

input{
padding:10px;
width:70%;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px;
background:#5499be;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#868786;
}

li{
margin-top:10px;
background:#eee;
padding:8px;
border-radius:5px;
display:flex;
justify-content:space-between;
}


.task-list3 {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 300px;
    margin: 40px auto;
}

.task-list3 a {
    text-decoration: none;
    background: #222;
    color: white;
    padding: 12px;
    text-align: center;
    border-radius: 8px;
    transition: 0.3s;
}
.task-list3 a:hover {
    background: #ff9800;
    transform: scale(1.05);}





</style>
</head>

<body>

<div class="container">

<h2>My Todo List</h2>

<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

displayTasks();

function addTask(){

let input = document.getElementById("taskInput");
let task = input.value;

if(task === ""){
alert("Enter a task");
return;
}

tasks.push(task);

localStorage.setItem("tasks", JSON.stringify(tasks));

input.value="";

displayTasks();
}

function displayTasks(){

let list = document.getElementById("taskList");

list.innerHTML="";

tasks.forEach(function(task,index){

let li = document.createElement("li");

li.innerHTML = task + 
' <button onclick="deleteTask('+index+')">X</button>';

list.appendChild(li);

});
}

function deleteTask(index){

tasks.splice(index,1);

localStorage.setItem("tasks", JSON.stringify(tasks));

displayTasks();

}

</script>

</body>
</html>
