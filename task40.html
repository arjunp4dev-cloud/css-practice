<!DOCTYPE html>
<html>
<head>
    <title>Fetch API</title>

    <style>
        body{
            font-family: Arial;
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            background:#1e293b;
            padding:30px;
            border-radius:10px;
            text-align:center;
            width:300px;
        }

        button{
            padding:10px 20px;
            background:#da72a6;
            border:none;
            color:white;
            border-radius:6px;
            cursor:pointer;
            margin-bottom:20px;
        }

        button:hover{
            background:#db2777;
        }

        #user{
            margin-top:15px;
        }

        

.task-list3 {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 300px;
    margin: 40px auto;
}

.task-list3 a {
    text-decoration: none;
    background: #222;
    color: white;
    padding: 12px;
    text-align: center;
    border-radius: 8px;
    transition: 0.3s;
}
.task-list3 a:hover {
    background: #ff9800;
    transform: scale(1.05);}


    </style>
</head>

<body>

<div class="container">
    <h2>Fetch API Demo</h2>

    <button onclick="loadUser()">Load User</button>

    <div id="user"></div>
</div>

<script>
async function loadUser(){

    document.getElementById("user").innerHTML = "Loading...";

    try{
        let response = await fetch("https://jsonplaceholder.typicode.com/users/1");
        let data = await response.json();

        document.getElementById("user").innerHTML = `
            <h3>${data.name}</h3>
            <p>${data.email}</p>
        `;
    }
    catch(error){
        document.getElementById("user").innerHTML = "Error loading data";
        console.log(error);
    }
}
</script>

</body>
</html>
