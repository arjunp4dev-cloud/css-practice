<!DOCTYPE html>
<html>
<head>
    <title>Array Filtering</title>

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            background:#1e293b;
            padding:25px;
            border-radius:10px;
            width:400px;
        }

        button{
            padding:10px 15px;
            background:#8b5cf6;
            border:none;
            color:white;
            border-radius:6px;
            cursor:pointer;
            margin-bottom:15px;
        }

        .item{
            display:flex;
            justify-content:space-between;
            padding:8px 0;
            border-bottom:1px solid #334155;
        }
        .task-list3 {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 300px;
    margin: 40px auto;
}

.task-list3 a {
    text-decoration: none;
    background: #222;
    color: white;
    padding: 12px;
    text-align: center;
    border-radius: 8px;
    transition: 0.3s;
}
.task-list3 a:hover {
    background: #ff9800;
    transform: scale(1.05);}


    </style>
</head>

<body>

<div class="container">
    <h2>Products</h2>

    <button onclick="filterItems()">Show Items &lt; $50</button>

    <div id="list"></div>
</div>

<script>
const products = [
    { name: "Mouse", price: 25 },
    { name: "Keyboard", price: 100 },
    { name: "Monitor", price: 300 },
    { name: "Cable", price: 10 },
    { name: "Pad", price: 15 }
];

displayItems(products);

function displayItems(items){
    let html = "";

    items.forEach(item => {
        html += `
            <div class="item">
                <span>${item.name}</span>
                <span>$${item.price}</span>
            </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}


function filterItems(){
    const filtered = products.filter(item => item.price < 50);
    displayItems(filtered);
}
</script>

</body>
</html>
