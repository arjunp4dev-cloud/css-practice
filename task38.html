<!DOCTYPE html>
<html>
<head>
<title>Countdown Timer</title>

<style>
body{
background:#081b33;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
}

.container{
text-align:center;
}

#count{
font-size:60px;
margin-bottom:10px;
}

button{
background:#17a2b8;
border:none;
padding:12px 20px;
color:white;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#138496;
}


.task-list3 {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 300px;
    margin: 40px auto;
}

.task-list3 a {
    text-decoration: none;
    background: #222;
    color: white;
    padding: 12px;
    text-align: center;
    border-radius: 8px;
    transition: 0.3s;
}
.task-list3 a:hover {
    background: #ff9800;
    transform: scale(1.05);}

</style>

</head>

<body>

<div class="container">
<h1 id="count">10</h1>
<p>S</p>

<button onclick="startCountdown()">Start Countdown</button>
</div>

<script>

let time = 10;
let timer;

function startCountdown(){

clearInterval(timer);

timer = setInterval(function(){

document.getElementById("count").innerHTML = time;

if(time <= 0){
clearInterval(timer);
time = 10;   
return;
}

time--;

},1000);

}
</script>

</body>
</html>
