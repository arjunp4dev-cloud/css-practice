<!DOCTYPE html>
<html>
<head>
    <title>Destructuring & Spread</title>

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .box{
            background:#1e293b;
            padding:25px;
            border-radius:10px;
            width:400px;
        }

        pre{
            background:#0f172a;
            padding:10px;
            border-radius:5px;
            overflow:auto;
        }


        .task-list3 {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 300px;
    margin: 40px auto;
}

.task-list3 a {
    text-decoration: none;
    background: #222;
    color: white;
    padding: 12px;
    text-align: center;
    border-radius: 8px;
    transition: 0.3s;
}
.task-list3 a:hover {
    background: #ff9800;
    transform: scale(1.05);}


    </style>
</head>

<body>

<div class="box">
    <h2>Destructuring & Spread</h2>
    <div id="output"></div>
</div>

<script>

const user = {
    name: "Sarah",
    age: 28
};

const details = {
    city: "New York",
    job: "Designer",
    active: true
};


const { name } = user;
const { city } = details;


const merged = { ...user, ...details };


document.getElementById("output").innerHTML = `
    <p><b>Name:</b> ${name}</p>
    <p><b>City:</b> ${city}</p>

    <h3>Merged Object:</h3>
    <pre>${JSON.stringify(merged, null, 2)}</pre>
`;
</script>

</body>
</html>
